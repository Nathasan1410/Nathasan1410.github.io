<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=https://www.kaggle.com/competitions/gemma-4-good-hackathon/writeups/Swara" />
    <title>Swara | Nathanael Santoso</title>
    <meta
      name="description"
      content="Swara is an offline-first Android emergency guide and on-device Gemma assistant for disconnected situations."
    />
    <meta property="og:title" content="Swara | Offline Emergency Guidance" />
    <meta
      property="og:description"
      content="An offline-first Android emergency guide and on-device Gemma assistant built for the Gemma 4 Good Hackathon."
    />
    <meta property="og:url" content="https://www.kaggle.com/competitions/gemma-4-good-hackathon/writeups/Swara" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #101820;
        --panel: #17232d;
        --text: #f4f7f2;
        --muted: #aab7b6;
        --green: #7bd389;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(680px, calc(100% - 40px));
        border: 1px solid rgba(244, 247, 242, 0.16);
        border-radius: 8px;
        background: var(--panel);
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 1.05rem;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        border-radius: 8px;
        background: var(--green);
        color: #0c1714;
        font-weight: 800;
        padding: 0 16px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Swara</h1>
      <p>
        Offline-first Android emergency guidance and on-device Gemma assistance
        for situations where networks fail.
      </p>
      <a href="https://www.kaggle.com/competitions/gemma-4-good-hackathon/writeups/Swara">
        Open the Swara writeup
      </a>
    </main>
  </body>
</html>
